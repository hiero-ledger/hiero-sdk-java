# SPDX-License-Identifier: Apache-2.0
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8

# Dependency versions - defined here so they are visible to Snyk's static analysis
# and referenced from build.gradle.kts files as: val protobufVersion: String by project
protobufVersion=4.35.1
grpcVersion=1.82.1

# Enable Build Caching and parallelization (through Configuration Cache)
org.gradle.caching=true
org.gradle.configuration-cache=true

# Limit parallel workers
org.gradle.workers.max=6
